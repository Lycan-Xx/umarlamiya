<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: white;
            background: linear-gradient(135deg, rgba(0, 51, 102, 0.8), rgba(0, 0, 0, 0.8));
        }
        h1 {
            font-size: 4em;
            margin: 0;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .project {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .project:hover {
            transform: translateY(-10px);
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.5);
        }
        .project h2 {
            color: #00ffff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
    </header>
    <section class="projects">
        <div class="project">
            <h2>NSITF-RAG-AUTOMATION</h2>
            <p>A brief description of the NSITF-RAG-AUTOMATION.</p>
        </div>
        <div class="project">
            <h2>medroute-core</h2>
            <p>A brief description of medroute-core.</p>
        </div>
        <div class="project">
            <h2>WiFi DensePose</h2>
            <p>A brief description of WiFi DensePose.</p>
        </div>
        <!-- Add more projects here -->
    </section>
</body>
</html>
